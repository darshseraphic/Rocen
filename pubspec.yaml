name: rocen
description: "A minimal workspace capture engine."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management Framework
  flutter_riverpod: ^2.4.9

  # Persistent Disk Storage Subsystems
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Native UI Layout Kits & Asset Management
  flutter_staggered_grid_view: ^0.7.0
  file_picker: ^8.0.0
  photo_manager: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true